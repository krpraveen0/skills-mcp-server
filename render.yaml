services:
  # ── Redis / Key Value Cache ────────────────────────────
  - type: keyvalue
    name: skills-mcp-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    maxmemoryPolicy: allkeys-lru

  # ── Go Backend API Server ──────────────────────────────
  - type: web
    name: skills-mcp-backend
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: ./backend
    branch: main
    autoDeployTrigger: commit
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ENV
        value: production
      - key: SQLITE_PATH
        value: /tmp/skills.db
      - key: MIGRATIONS_PATH
        value: /migrations
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: skills-mcp-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_TRENDING
        value: "86400"
      - key: CACHE_TTL_SKILL
        value: "3600"
      - key: CRAWL_SCHEDULE
        value: "0 2 * * *"
      - key: CRAWL_MAX_RESULTS
        value: "500"

  # ── React Frontend (Static Site) ──────────────────────
  # Note: region is NOT valid for static sites per Render spec
  - type: web
    name: skills-mcp-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    branch: main
    autoDeployTrigger: commit
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: https://skills-mcp-backend.onrender.com/api/$1
      - type: rewrite
        source: /mcp
        destination: https://skills-mcp-backend.onrender.com/mcp
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://skills-mcp-backend.onrender.com
