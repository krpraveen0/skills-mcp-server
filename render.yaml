services:
  # ── Go Backend API Server ─────────────────────────────
  - type: web
    name: skills-mcp-backend
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: ./backend
    branch: release/*
    autoDeploy: true
    region: oregon
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ENV
        value: production
      - key: SQLITE_PATH
        value: /data/skills.db
      - key: MIGRATIONS_PATH
        value: /migrations
      - key: REDIS_URL
        fromService:
          type: redis
          name: skills-mcp-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false   # Set manually in Render dashboard
      - key: ADMIN_API_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_TRENDING
        value: "86400"
      - key: CACHE_TTL_SKILL
        value: "3600"
      - key: CRAWL_SCHEDULE
        value: "0 2 * * *"
      - key: CRAWL_MAX_RESULTS
        value: "500"
    disk:
      name: skills-data
      mountPath: /data
      sizeGB: 1

  # ── Background Crawl Worker ───────────────────────────
  - type: worker
    name: skills-mcp-worker
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: ./backend
    dockerCommand: /worker
    branch: release/*
    autoDeploy: true
    region: oregon
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: SQLITE_PATH
        value: /data/skills.db
      - key: MIGRATIONS_PATH
        value: /migrations
      - key: REDIS_URL
        fromService:
          type: redis
          name: skills-mcp-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: API_KEY_SALT
        fromService:
          type: web
          name: skills-mcp-backend
          envVarKey: API_KEY_SALT
      - key: CRAWL_SCHEDULE
        value: "0 2 * * *"
      - key: CRAWL_MAX_RESULTS
        value: "500"
    disk:
      name: skills-data
      mountPath: /data
      sizeGB: 1

  # ── React Frontend (Static Site) ─────────────────────
  - type: web
    name: skills-mcp-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    branch: release/*
    autoDeploy: true
    region: oregon
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: https://skills-mcp-backend.onrender.com/api/$1
      - type: rewrite
        source: /mcp
        destination: https://skills-mcp-backend.onrender.com/mcp
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: skills-mcp-backend
          property: host

# ── Redis ─────────────────────────────────────────────
databases:
  - name: skills-mcp-redis
    type: redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
