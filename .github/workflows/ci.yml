name: CI

on:
  pull_request:
    branches: [main, 'release/*']
  push:
    branches: [main, 'release/*']

jobs:
  # ─────────────────────────────────────────
  # Go Backend — Build, Vet, Test
  # ─────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.mod

      - name: Tidy and download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build server
        run: go build -v ./cmd/server/...

      - name: Build worker
        run: go build -v ./cmd/worker/...

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # ─────────────────────────────────────────
  # React Frontend — TypeScript + Build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # Docker Build Smoke Test
  # ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: false
          tags: skills-mcp/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: false
          tags: skills-mcp/frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
