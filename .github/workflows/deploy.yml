name: Deploy to Render

on:
  push:
    branches:
      - 'release/*'

jobs:
  # ─────────────────────────────────────────
  # Build Docker Images → Push to GHCR
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Trigger Render Deploy via Deploy Hook
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -fsSL "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -X POST \
            -d "" \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Trigger Render worker deploy
        run: |
          curl -fsSL "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}" \
            -X POST \
            -d "" \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Trigger Render frontend deploy
        run: |
          curl -fsSL "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -X POST \
            -d "" \
            -o /dev/null -w "HTTP %{http_code}\n"

      - name: Wait for backend health
        run: |
          echo "Waiting 60s for Render deployment to warm up..."
          sleep 60
          MAX_RETRIES=10
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_BACKEND_URL }}/health" || echo "000")
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Backend health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend URL: ${{ secrets.RENDER_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
